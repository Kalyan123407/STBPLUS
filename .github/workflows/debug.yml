name: 🔍 Debug Single Channel Test

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install
        run: pip install requests

      - name: 🔍 Debug Test
        env:
          JIOTV_TOKEN:      ${{ secrets.JIOTV_TOKEN }}
          CLEARKEY_URL:     ${{ secrets.CLEARKEY_URL }}
          JIO_API_BASE:     ${{ secrets.JIO_API_BASE }}
          JIO_SUB_ID:       ${{ secrets.JIO_SUB_ID }}
          JIO_RMN:          ${{ secrets.JIO_RMN }}
          JIO_API_SIG:      ${{ secrets.JIO_API_SIG }}
          JIO_FEATURE_CODE: ${{ secrets.JIO_FEATURE_CODE }}
        run: python debug.py

      - name: 📊 Show Result
        if: always()
        run: |
          echo "=========================================="
          echo "🔍 DEBUG RESULTS:"
          echo "=========================================="
          cat debug_output.txt 2>/dev/null || echo "No output file"
